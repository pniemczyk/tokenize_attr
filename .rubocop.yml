AllCops:
  TargetRubyVersion: 3.2

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Style/FormatStringToken:
  Exclude:
    - "lib/tasks/tokenize_attr.rake"

Lint/ConstantDefinitionInBlock:
  Exclude:
    - "lib/tasks/tokenize_attr.rake"
